plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.euphoricaudio'
version = '0.7.10'

android {
  namespace "expo.modules.euphoricaudio"
  defaultConfig {
    versionCode 1
    versionName "0.7.10"

    externalNativeBuild {
      cmake {
        cppFlags "-std=c++17"
        arguments "-DANDROID_STL=c++_shared"
      }
    }
  }

  buildFeatures {
    prefab true
  }

  externalNativeBuild {
    cmake {
      path "CMakeLists.txt"
    }
  }

  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation("com.google.oboe:oboe:1.8.0")
}
